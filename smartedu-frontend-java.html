<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEdu Manager - Engineering College Portal</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; background: #0f1623; }

        /* LOGIN PAGE STYLES */
        .login-bg {
            background: #0a0f1e;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .login-bg::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .login-bg::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16,185,129,0.13) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            backdrop-filter: blur(24px);
            border-radius: 24px;
        }
        .role-btn {
            border: 1.5px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 14px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            color: #94a3b8;
        }
        .role-btn:hover { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.08); color: #c7d2fe; }
        .role-btn.active { border-color: #6366f1; background: rgba(99,102,241,0.15); color: #a5b4fc; }
        .role-btn .role-icon { font-size: 1.8rem; margin-bottom: 6px; }
        .role-btn .role-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
        .login-input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px 16px;
            color: #e2e8f0;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-input::placeholder { color: #475569; }
        .login-input:focus { border-color: #6366f1; background: rgba(99,102,241,0.08); }
        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all 0.25s ease;
            letter-spacing: 0.02em;
        }
        .login-btn-admin { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
        .login-btn-teacher { background: linear-gradient(135deg, #0ea5e9, #6366f1); color: white; }
        .login-btn-student { background: linear-gradient(135deg, #10b981, #0ea5e9); color: white; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
        .login-notice {
            background: rgba(99,102,241,0.08);
            border: 1px solid rgba(99,102,241,0.25);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.82rem;
            color: #a5b4fc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .login-label { font-size: 0.8rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 0.85rem;
        }
        .divider-line { height: 1px; background: rgba(255,255,255,0.07); }

        /* PORTAL HEADER & NAV */
        .portal-header {
            background: rgba(15,22,35,0.97);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .portal-bg { background: #0f1623; min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 16px; }
        .glass-light { background: rgba(255,255,255,0.97); border-radius: 16px; }
        .nav-btn { padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; }
        .nav-btn-active { background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
        .nav-btn-inactive { background: transparent; color: #64748b; border: 1px solid transparent; }
        .nav-btn-inactive:hover { background: rgba(255,255,255,0.05); color: #94a3b8; }

        /* ADMIN DASHBOARD STYLES */
        .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; transition: all 0.25s; }
        .stat-card:hover { border-color: rgba(99,102,241,0.3); background: rgba(99,102,241,0.06); }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-admin { background: rgba(139,92,246,0.2); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.3); }
        .badge-teacher { background: rgba(14,165,233,0.2); color: #7dd3fc; border: 1px solid rgba(14,165,233,0.3); }
        .badge-student { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

        /* FORMS */
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input::placeholder { color: #475569; }
        .form-input:focus { border-color: #6366f1; background: rgba(99,102,241,0.08); }
        .form-label { font-size: 0.8rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
        .btn-danger { background: rgba(239,68,68,0.15); color: #f87171; padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(239,68,68,0.25); font-weight: 600; cursor: pointer; font-size: 0.83rem; transition: all 0.2s; }
        .btn-danger:hover { background: rgba(239,68,68,0.25); }
        .btn-edit { background: rgba(99,102,241,0.15); color: #a5b4fc; padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(99,102,241,0.25); font-weight: 600; cursor: pointer; font-size: 0.83rem; transition: all 0.2s; }
        .btn-edit:hover { background: rgba(99,102,241,0.25); }

        /* TABLE */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 12px 16px; font-size: 0.75rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid rgba(255,255,255,0.07); }
        .data-table td { padding: 14px 16px; font-size: 0.88rem; color: #cbd5e1; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-box { background: #151e2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 32px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }

        /* STUDENT/TEACHER DASHBOARDS */
        .progress-bar { transition: width 1s ease-out; }

        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeSlideUp 0.4s ease-out; }

        /* CREDENTIAL CARD */
        .cred-card { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); border-radius: 14px; padding: 20px; }
        .cred-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .cred-item:last-child { border-bottom: none; }
        .cred-label { font-size: 0.78rem; font-weight: 600; color: #6ee7b7; text-transform: uppercase; letter-spacing: 0.06em; }
        .cred-value { font-family: 'Space Grotesk', monospace; font-weight: 600; color: #e2e8f0; font-size: 0.95rem; background: rgba(255,255,255,0.07); padding: 4px 12px; border-radius: 6px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 10px; }

        /* Grid dots background on login */
        .dots-bg {
            background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 28px 28px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // ─── API BASE URL ─────────────────────────────────────────────────────────────
        // Change this to your deployed Java backend URL in production
        const API_BASE = 'http://localhost:8080/api';

        // ─── API HELPER ───────────────────────────────────────────────────────────────
        const api = {
            get: (path) => fetch(`${API_BASE}${path}`).then(r => r.json()),
            post: (path, body) => fetch(`${API_BASE}${path}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            }).then(r => r.json()),
            delete: (path) => fetch(`${API_BASE}${path}`, { method: 'DELETE' }).then(r => r.json()),
            put: (path, body) => fetch(`${API_BASE}${path}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            }).then(r => r.json()),
        };

        // ─── MAIN APP ─────────────────────────────────────────────────────────────────

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const handleLogin = (user) => setCurrentUser(user);
            const handleLogout = () => setCurrentUser(null);

            return (
                <div>
                    {!currentUser
                        ? <LoginPage onLogin={handleLogin} />
                        : <Dashboard user={currentUser} onLogout={handleLogout} />
                    }
                </div>
            );
        }

        // ─── LOGIN PAGE ───────────────────────────────────────────────────────────────

        function LoginPage({ onLogin }) {
            const [role, setRole] = useState('student');
            const [userId, setUserId] = useState('');
            const [password, setPassword] = useState('');
            const [showPwd, setShowPwd] = useState(false);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const roles = [
                { key: 'admin', icon: '🛡️', label: 'Admin' },
                { key: 'teacher', icon: '👨‍🏫', label: 'Teacher' },
                { key: 'student', icon: '🎓', label: 'Student' },
            ];

            const btnClass = { admin: 'login-btn-admin', teacher: 'login-btn-teacher', student: 'login-btn-student' };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    const res = await api.post('/auth/login', { userId: userId.trim(), password, role });
                    if (res.success) {
                        onLogin(res.user);
                    } else {
                        setError(res.message || 'Login failed.');
                    }
                } catch (err) {
                    setError('Cannot connect to server. Make sure the Java backend is running on port 8080.');
                } finally {
                    setLoading(false);
                }
            };

            const placeholders = { admin: 'e.g. ADMIN001', teacher: 'e.g. TCH2026001', student: 'e.g. STU2026001' };

            return (
                <div className="login-bg dots-bg flex items-center justify-center min-h-screen p-4">
                    <div className="w-full max-w-md animate-in">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
                                style={{background: 'linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%)'}}>
                                <span style={{fontSize: '2rem'}}>🎓</span>
                            </div>
                            <h1 className="text-3xl font-extrabold text-white mb-1" style={{fontFamily: 'Space Grotesk'}}>
                                SmartEdu Manager
                            </h1>
                            <p className="text-slate-400 text-sm font-medium tracking-wide">Engineering College Portal</p>
                        </div>

                        <div className="login-card p-8">
                            <div className="login-notice mb-6">
                                <span style={{fontSize:'1.1rem'}}>🔐</span>
                                <span>Use the <strong>User ID and Password</strong> provided by the Admin to sign in.</span>
                            </div>

                            <div className="mb-6">
                                <p className="login-label">Select Your Role</p>
                                <div className="grid grid-cols-3 gap-3">
                                    {roles.map(r => (
                                        <button key={r.key} type="button"
                                            className={`role-btn ${role === r.key ? 'active' : ''}`}
                                            onClick={() => { setRole(r.key); setError(''); setUserId(''); setPassword(''); }}>
                                            <div className="role-icon">{r.icon}</div>
                                            <div className="role-label">{r.label}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="divider-line mb-6"></div>

                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label className="login-label">User ID</label>
                                    <input
                                        className="login-input"
                                        type="text"
                                        value={userId}
                                        onChange={e => setUserId(e.target.value)}
                                        placeholder={placeholders[role]}
                                        required
                                        autoComplete="username"
                                    />
                                </div>

                                <div>
                                    <label className="login-label">Password</label>
                                    <div style={{position:'relative'}}>
                                        <input
                                            className="login-input"
                                            type={showPwd ? 'text' : 'password'}
                                            value={password}
                                            onChange={e => setPassword(e.target.value)}
                                            placeholder="Enter your password"
                                            required
                                            autoComplete="current-password"
                                            style={{paddingRight: '44px'}}
                                        />
                                        <button type="button" onClick={() => setShowPwd(!showPwd)}
                                            style={{position:'absolute', right:'12px', top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'#64748b', fontSize:'1rem'}}>
                                            {showPwd ? '🙈' : '👁️'}
                                        </button>
                                    </div>
                                </div>

                                {error && <div className="error-box">⚠️ {error}</div>}

                                <button type="submit" className={`login-btn ${btnClass[role]}`} disabled={loading}>
                                    {loading ? '⏳ Signing in...' : `Sign In as ${roles.find(r2=>r2.key===role).label}`}
                                </button>
                            </form>

                            <div className="mt-6 text-center">
                                <p className="text-slate-600 text-xs">
                                    Don't have credentials? Contact your college administrator.
                                </p>
                            </div>
                        </div>

                        <p className="text-center text-slate-700 text-xs mt-5">
                            © 2026 SmartEdu Manager · All rights reserved
                        </p>
                    </div>
                </div>
            );
        }

        // ─── MAIN DASHBOARD ───────────────────────────────────────────────────────────

        function Dashboard({ user, onLogout }) {
            const [activePage, setActivePage] = useState('dashboard');
            const [attendance, setAttendance] = useState([]);
            const [exams, setExams] = useState([]);
            const [notes, setNotes] = useState([]);
            const [allUsers, setAllUsers] = useState([]);

            const loadData = async () => {
                try {
                    const [att, ex, nt, users] = await Promise.all([
                        api.get('/attendance'),
                        api.get('/exams'),
                        api.get('/notes'),
                        api.get('/users'),
                    ]);
                    setAttendance(att);
                    setExams(ex);
                    setNotes(nt);
                    setAllUsers(users);
                } catch (e) {
                    console.error('Failed to load data', e);
                }
            };

            useEffect(() => { loadData(); }, [activePage]);

            const userAttendance = user.role === 'student'
                ? attendance.filter(a => a.studentId === user.userId)
                : attendance;
            const userExams = user.role === 'student'
                ? exams.filter(e => e.studentId === user.userId)
                : exams;

            const roleLabel = { admin: 'Administrator', teacher: 'Faculty', student: 'Student' };
            const roleColor = { admin: '#8b5cf6', teacher: '#0ea5e9', student: '#10b981' };
            const roleBadgeClass = { admin: 'badge-admin', teacher: 'badge-teacher', student: 'badge-student' };

            const navItems = user.role === 'admin' ? [
                { key: 'dashboard', label: '📊 Overview' },
                { key: 'manage-users', label: '👥 Manage Users' },
            ] : user.role === 'teacher' ? [
                { key: 'dashboard', label: '📊 Dashboard' },
                { key: 'manage-attendance', label: '✅ Mark Attendance' },
                { key: 'attendance-analysis', label: '📈 Analysis' },
                { key: 'manage-marks', label: '📝 Add Marks' },
                { key: 'upload-notes', label: '📁 Upload Notes' },
                { key: 'view-students', label: '👥 Students' },
            ] : [
                { key: 'dashboard', label: '📊 Dashboard' },
                { key: 'attendance', label: '📅 Attendance' },
                { key: 'exams', label: '📝 Exams' },
                { key: 'notes', label: '📚 Study Notes' },
                { key: 'progress', label: '📈 Progress' },
            ];

            return (
                <div className="portal-bg min-h-screen">
                    <div className="portal-header px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 rounded-xl flex items-center justify-center text-lg"
                                style={{background: `linear-gradient(135deg, ${roleColor[user.role]}, ${roleColor[user.role]}aa)`}}>
                                {user.role === 'admin' ? '🛡️' : user.role === 'teacher' ? '👨‍🏫' : '🎓'}
                            </div>
                            <div>
                                <h1 className="text-white font-bold text-sm" style={{fontFamily: 'Space Grotesk'}}>SmartEdu Manager</h1>
                                <p className="text-slate-500 text-xs">Engineering College Portal</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right hidden sm:block">
                                <p className="text-white text-sm font-semibold">{user.name}</p>
                                <span className={`badge ${roleBadgeClass[user.role]}`}>{roleLabel[user.role]}</span>
                            </div>
                            <button onClick={onLogout}
                                className="btn-danger" style={{padding:'8px 16px', fontSize:'0.83rem'}}>
                                Sign Out
                            </button>
                        </div>
                    </div>

                    <div style={{borderBottom:'1px solid rgba(255,255,255,0.06)', background:'rgba(15,22,35,0.8)'}}>
                        <div className="max-w-7xl mx-auto px-6 py-3 flex gap-2 overflow-x-auto">
                            {navItems.map(item => (
                                <button key={item.key} onClick={() => setActivePage(item.key)}
                                    className={`nav-btn ${activePage === item.key ? 'nav-btn-active' : 'nav-btn-inactive'}`}
                                    style={{whiteSpace:'nowrap'}}>
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-6 py-8 animate-in">
                        {/* ADMIN PAGES */}
                        {user.role === 'admin' && activePage === 'dashboard' && <AdminDashboard allUsers={allUsers} attendance={attendance} exams={exams} notes={notes} />}
                        {user.role === 'admin' && activePage === 'manage-users' && <ManageUsersPage onRefresh={loadData} />}

                        {/* TEACHER PAGES */}
                        {user.role === 'teacher' && activePage === 'dashboard' && <DashboardContent user={user} attendance={userAttendance} exams={userExams} allUsers={allUsers} attendance_all={attendance} exams_all={exams} notes_all={notes} />}
                        {user.role === 'teacher' && activePage === 'manage-attendance' && <ManageAttendancePage onRefresh={loadData} allUsers={allUsers} />}
                        {user.role === 'teacher' && activePage === 'attendance-analysis' && <AttendanceAnalysisPage attendance={attendance} allUsers={allUsers} />}
                        {user.role === 'teacher' && activePage === 'manage-marks' && <ManageMarksPage onRefresh={loadData} allUsers={allUsers} />}
                        {user.role === 'teacher' && activePage === 'upload-notes' && <UploadNotesPage onRefresh={loadData} user={user} />}
                        {user.role === 'teacher' && activePage === 'view-students' && <ViewStudentsPage allUsers={allUsers} />}

                        {/* STUDENT PAGES */}
                        {user.role === 'student' && activePage === 'dashboard' && <DashboardContent user={user} attendance={userAttendance} exams={userExams} allUsers={allUsers} attendance_all={attendance} exams_all={exams} notes_all={notes} />}
                        {user.role === 'student' && activePage === 'attendance' && <AttendancePage attendance={userAttendance} />}
                        {user.role === 'student' && activePage === 'exams' && <ExamsPage exams={userExams} />}
                        {user.role === 'student' && activePage === 'notes' && <NotesPage notes={notes} userClass={user.year} userBranch={user.branch} />}
                        {user.role === 'student' && activePage === 'progress' && <ProgressPage attendance={userAttendance} exams={userExams} />}
                    </div>
                </div>
            );
        }

        // ─── ADMIN: OVERVIEW DASHBOARD ────────────────────────────────────────────────

        function AdminDashboard({ allUsers, attendance, exams, notes }) {
            const students = allUsers.filter(u => u.role === 'student');
            const teachers = allUsers.filter(u => u.role === 'teacher');

            const stats = [
                { label: 'Total Students', value: students.length, icon: '🎓', color: '#10b981', sub: 'Enrolled' },
                { label: 'Total Teachers', value: teachers.length, icon: '👨‍🏫', color: '#0ea5e9', sub: 'Faculty' },
                { label: 'Attendance Records', value: attendance.length, icon: '📊', color: '#6366f1', sub: 'Entries' },
                { label: 'Study Materials', value: notes.length, icon: '📚', color: '#f59e0b', sub: 'Uploaded' },
            ];

            return (
                <div className="space-y-8">
                    <div>
                        <h2 className="text-2xl font-bold text-white mb-1" style={{fontFamily:'Space Grotesk'}}>Admin Overview</h2>
                        <p className="text-slate-500 text-sm">System-wide statistics and quick insights</p>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                        {stats.map((s, i) => (
                            <div key={i} className="stat-card">
                                <div className="flex items-start justify-between mb-4">
                                    <div className="w-11 h-11 rounded-xl flex items-center justify-center text-2xl"
                                        style={{background: `${s.color}22`}}>
                                        {s.icon}
                                    </div>
                                    <span className="text-xs font-medium text-slate-600 uppercase tracking-wider">{s.sub}</span>
                                </div>
                                <div className="text-3xl font-bold text-white mb-1" style={{fontFamily:'Space Grotesk'}}>{s.value}</div>
                                <div className="text-slate-400 text-sm">{s.label}</div>
                            </div>
                        ))}
                    </div>

                    <div className="glass p-6">
                        <h3 className="text-lg font-bold text-white mb-4">Recently Added Accounts</h3>
                        {[...students, ...teachers].length === 0 ? (
                            <p className="text-slate-500 text-sm py-6 text-center">No accounts created yet. Go to Manage Users to add students and teachers.</p>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="data-table">
                                    <thead>
                                        <tr>
                                            <th>User ID</th><th>Name</th><th>Role</th><th>Dept / Year</th><th>Created</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {[...students, ...teachers]
                                            .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt))
                                            .slice(0,8)
                                            .map(u => (
                                            <tr key={u.id}>
                                                <td><span className="cred-value" style={{fontSize:'0.82rem'}}>{u.userId}</span></td>
                                                <td className="font-medium text-white">{u.name}</td>
                                                <td><span className={`badge ${u.role === 'teacher' ? 'badge-teacher' : 'badge-student'}`}>{u.role === 'teacher' ? 'Teacher' : 'Student'}</span></td>
                                                <td className="text-slate-400">{u.role === 'teacher' ? (u.department || '—') : `${u.year || ''} · ${u.branch || ''}`}</td>
                                                <td className="text-slate-500">{u.createdAt ? new Date(u.createdAt).toLocaleDateString('en-IN') : '—'}</td>
